name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bizpilot_test
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bizpilot_test
  CLERK_SECRET_KEY: sk_test_ci_placeholder
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
